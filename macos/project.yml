name: MDreader
options:
  bundleIdPrefix: com.mdreader
  deploymentTarget:
    macOS: "14.0"
  developmentLanguage: zh-Hans
settings:
  base:
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    CODE_SIGN_STYLE: Automatic
    CODE_SIGN_IDENTITY: "-"
targets:
  MDreader:
    type: application
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - path: MDreader
      - path: ../shared
        type: folder
        name: shared
    info:
      path: MDreader/Info.plist
      properties:
        CFBundleDisplayName: MDreader
        CFBundleDocumentTypes:
          - CFBundleTypeName: Markdown
            CFBundleTypeRole: Viewer
            LSItemContentTypes:
              - com.mdreader.markdown
            LSHandlerRank: Alternate
        UTImportedTypeDeclarations:
          - UTTypeIdentifier: com.mdreader.markdown
            UTTypeDescription: Markdown
            UTTypeConformsTo:
              - public.plain-text
            UTTypeTagSpecification:
              public.filename-extension:
                - md
                - markdown
                - mdown
              public.mime-type:
                - text/markdown
                - text/x-markdown
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.mdreader.macos
        PRODUCT_NAME: MDreader
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        GENERATE_INFOPLIST_FILE: NO
    preBuildScripts:
      - name: Generate build info
        script: |
          HASH=$(git -C "$SRCROOT/.." rev-parse --short HEAD 2>/dev/null || echo unknown)
          AUTHOR=$(git -C "$SRCROOT/.." config user.name 2>/dev/null || echo MDreader)
          BTIME=$(date "+%Y-%m-%d %H:%M:%S %Z")
          printf '{"gitHash":"%s","buildTime":"%s","author":"%s"}' "$HASH" "$BTIME" "$AUTHOR" > "$SRCROOT/MDreader/build-info.json"
  MDreaderTests:
    type: bundle.unit-test
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - path: Tests
    dependencies:
      - target: MDreader
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
